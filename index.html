<!DOCTYPE html>
<html lang="en">

<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Sorting Algorithm Visualizer</title>
   <link rel="stylesheet" href="style.css">
   
</head>

<body>
   <div id="sav-container">
      <div id="sav"></div>
   </div>
   
   <div id="settings">
      <input type="button" class="button" onClick="reset(true)" value="Reset">
      <input type="button" class="button" onClick="shuffle()" value="Shuffle">
      <input type="button" class="button" onClick="sort()" value="Sort">
      
      <input type="range" id="n-slider" min="0" max="5" step="1" value="2">
      <input type="range" id="base-slider" min="2" max="16" step="1" value="10">

      <input type="number" id="read-delay-number" min="4" max="500" step="4" value="4">
      <input type="number" id="write-delay-number" min="4" max="500" step="4" value="4">
      <input type="number" id="auxiliary-delay-number" min="4" max="500" step="4" value="4">

      <input type="checkbox" id="rainbow-checkbox" value="">

      <select name="algorithms" id="algorithm-dropdown">
         <optgroup label="Basic">
            <option value="bubble">Bubble Sort</option>
            <option value="cocktail">Cocktail Shaker Sort</option>
            <option value="selection">Selection Sort</option>
            <option value="insertion">Insertion Sort</option>
         </optgroup>

         <optgroup label="Comparison">
            <option value="comb">Comb Sort</option>
            <option value="heap">Heap Sort</option>
            <option value="shell">Shell Sort</option>
         </optgroup>

         <optgroup label="Divide & Conquer">
            <option value="quickLomaro">Quick Sort (Lomaro)</option>
            <option value="quickHoare">Quick Sort (Hoare)</option>
            <option value="merge">Merge Sort</option>
         </optgroup>

         <optgroup label="Distribution">
            <option value="radix">Radix Sort (LSD)</option>
            <option value="bucket">Bucket Sort</option>
            <option value="counting">Counting Sort</option>
         </optgroup>
      </select>
   </div>

   <script src="script.js"></script>
</body>

</html>
